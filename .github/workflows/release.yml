name: release

# Builds the portable Windows onefolder app and publishes it as a GitHub
# release whenever a version tag (v*) is pushed. The -SelfTest build runs
# first as the release gate: it builds AND runs the frozen smoke test
# (pdfplumber over a hand-written PDF, openpyxl round-trip, a real
# consolidator run, GUI construction) over the pruned bundle, so a broken
# bundle can never ship.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0); created at the chosen ref if it doesn't exist"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      # Tag push: the pushed tag. Manual dispatch: the typed tag (gh release
      # create makes the tag at this commit if it doesn't exist yet).
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build + run frozen self-test (release gate)
        run: powershell -ExecutionPolicy Bypass -File build\build.ps1 -SelfTest

      - name: Build the windowed app
        run: powershell -ExecutionPolicy Bypass -File build\build.ps1

      - name: Zip the portable folder
        run: Compress-Archive -Path "dist\TSMIS Consolidator" -DestinationPath "TSMIS-Consolidator-$env:TAG-win64.zip"

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$env:TAG"
          "TSMIS-Consolidator-$env:TAG-win64.zip"
          --target "${{ github.sha }}"
          --title "TSMIS Consolidator $env:TAG"
          --notes-file build/release_notes.md
